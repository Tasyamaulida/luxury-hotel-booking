{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Kamar</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f5f8fd;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;
        }

        .container{
            width:100%;
            max-width:700px;
            background:white;
            border-radius:20px;
            padding:40px;
            box-shadow:0 10px 40px rgba(0,0,0,.08);
        }

        .title{
            font-size:32px;
            font-weight:700;
            color:#0b1f44;
            margin-bottom:10px;
        }

        .subtitle{
            color:#7c8aa5;
            margin-bottom:30px;
        }

        .room-box{
            display:flex;
            gap:20px;
            margin-bottom:30px;
            padding:20px;
            border-radius:15px;
            background:#f8fbff;
        }

        .room-box img{
            width:180px;
            height:120px;
            object-fit:cover;
            border-radius:12px;
        }

        .room-info h3{
            color:#0b1f44;
            margin-bottom:8px;
        }

        .room-info p{
            color:#666;
            margin-bottom:5px;
        }

        .price{
            color:#2d8cff;
            font-size:22px;
            font-weight:700;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#0b1f44;
        }

        input{
            width:100%;
            padding:14px;
            border:1px solid #ddd;
            border-radius:10px;
            outline:none;
        }

        input:focus{
            border-color:#2d8cff;
        }

        .btn{
            width:100%;
            height:55px;
            border:none;
            border-radius:12px;
            background:#2d8cff;
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
        }

        .btn:hover{
            background:#1978f0;
        }

    </style>
</head>
<body>

<div class="container">

    <h1 class="title">Booking Kamar</h1>
    <p class="subtitle">Lengkapi data booking Anda.</p>

    <div class="room-box">

        <img src="{{ room.image.url }}" alt="room">

        <div class="room-info">
            <h3>{{ room.name }}</h3>

            <p>Kategori :
                {{ room.get_category_display }}
            </p>

            <p>Kapasitas :
                {{ room.capacity }} Orang
            </p>

            <div class="price">
                Rp {{ room.price }}
            </div>
        </div>

    </div>

    <form method="POST">

        {% csrf_token %}
{% if adminform.form.errors %}
<div style="
background:#fee2e2;
color:#dc2626;
padding:20px;
margin-bottom:20px;
border-radius:12px;
font-weight:bold;
">
{{ adminform.form.errors }}
</div>
{% endif %}

        <div class="form-group">
            <label>Check In</label>
            <input
                type="date"
                name="check_in"
                required
            >
        </div>

        <div class="form-group">
            <label>Check Out</label>
            <input
                type="date"
                name="check_out"
                required
            >
        </div>

        <div class="form-group">
            <label>Jumlah Tamu</label>
            <input
                type="number"
                name="guests"
                min="1"
                value="1"
                required
            >
        </div>

        <button class="btn" type="submit">
            Booking Sekarang
        </button>

    </form>

</div>

</body>
</html>
